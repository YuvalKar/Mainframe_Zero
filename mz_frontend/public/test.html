<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test HUD - Optimized</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .hud-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* SVG Container Optimization */
        .svg-wrapper {
            width: 80%; /* Adjusted for visibility */
            height: 80%;
        }

        .self-spin {
            /* Set the rotation center to the middle of the SVG coordinate system */
            transform-origin: center;
            
            /* High-performance CSS animation */
            animation: rotate-circle 10s linear infinite;
            
            /* Force GPU layer creation to reduce Repaint/Rasterization costs */
            will-change: transform;
        }

        @keyframes rotate-circle {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="hud-container">
        <h1>Testing HUD Elements</h1>
        <p>This is a test page for HUD elements.</p>
        
        <div class="svg-wrapper">
            <svg viewBox="0 0 50 50" style="width:100%; height: 100%;">
                <circle 
                    class="self-spin" 
                    cx="25" 
                    cy="25" 
                    r="20" 
                    fill="none" 
                    stroke="#4da8da" 
                    stroke-width="2" 
                    stroke-dasharray="10 5" 
                />
            </svg>
        </div>
    </div>
</body>
</html>
